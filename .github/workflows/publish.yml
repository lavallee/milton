name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-milton-agents
      url: https://pypi.org/p/milton-agents
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Verify locked release tree
        run: uv lock --check
      - name: Run release gates
        run: |
          uv sync --frozen
          uv run ruff format --check src/ tests/ scripts/
          uv run ruff check src/ tests/ scripts/
          uv run mypy --strict src tests scripts
          uv run pytest -q
      - name: Build distributions
        run: uv build
      - name: Verify clean wheel install
        run: uv run python scripts/release_smoke.py dist/milton_agents-*.whl
      - name: Publish milton-agents
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
